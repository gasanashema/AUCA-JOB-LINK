<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
</head>
<body>
    <h1>Button Test</h1>
    <button onclick="testButton()">Click Me</button>
    <p id="result"></p>

    <script>
        function testButton() {
            document.getElementById('result').innerHTML = 'Button works!';
            
            // Test backend connection
            fetch('http://localhost:5000/api/jobs')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('result').innerHTML += '<br>Backend connected! Jobs: ' + data.length;
                })
                .catch(err => {
                    document.getElementById('result').innerHTML += '<br>Backend error: ' + err.message;
                });
        }
    </script>
</body>
</html>
